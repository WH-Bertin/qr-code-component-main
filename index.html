<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | QR code component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
    body{
      background-color:   hsl(212, 45%, 89%);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      min-height: 100vh;
      width: 100vw;
      object-fit: contain;
      font-size: 15px;
      min-width: 375px;
      max-width: 1440px;
      
    }
    
 #r{
  color:  hsl(218, 44%, 22%);
  font-family: "Outfit", sans-serif;
  font-optical-sizing: auto;
  font-weight: 700;
  font-style: bold;
}
#w {
  color: hsl(216, 15%, 48%);
  font-family: "Outfit", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-size: 11px;
}
p{
  padding: 7px 15px ;
  text-align: center;
}
    #cards{
      width: 18%;
      max-width: 320%;
      background-color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 10px;
      border-radius: 10px;

    }
    #cards img{
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div id="cards"> 
    <img src="images/image-qr-code.png" alt="Qr code of frontendmentor " srcset="">
    <p id="r">Improve your front-end skills by building projects</p>
    <p id="w"> scan the QR code to visit Frontend Mentor and take your coding skills to the next level </p>   
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Bertin</a>.
  </footer>
</body>
</html>
